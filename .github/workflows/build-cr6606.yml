name: Build OpenWrt CR660X (23.05 + SSR+ Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl python3

    - name: Clone OpenWrt 23.05
      run: |
        git clone https://github.com/openwrt/openwrt.git -b openwrt-23.05 --depth 1 openwrt
        cd openwrt
        ./scripts/feeds update -a

    - name: Add SSR+ feed (with retry + fallback)
      run: |
        cd openwrt

        echo "src-git helloworld https://github.com/fw876/helloworld" >> feeds.conf.default

        echo "尝试克隆 SSR+ 主源..."
        for i in 1 2 3 4 5; do
          git clone https://github.com/fw876/helloworld feeds/helloworld && break
          echo "主源失败，重试第 $i 次..."
          sleep 5
        done

        if [ ! -d "feeds/helloworld" ]; then
          echo "主源失败，切换到镜像源..."
          git clone https://mirror.ghproxy.com/https://github.com/fw876/helloworld feeds/helloworld
        fi

        ./scripts/feeds update helloworld
        ./scripts/feeds install -a -p helloworld
        ./scripts/feeds install -a

    - name: Load CR660X seed config
      run: |
        cd openwrt
        cp ../config/cr660x.seed .config
        make defconfig

    - name: Show final target info
      run: |
        cd openwrt
        echo "==== TARGET CHECK ===="
        grep CONFIG_TARGET_ .config || true
        grep CR660X .config || true

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-cr660x-23.05
        path: |
          openwrt/bin/targets/
          openwrt/bin/packages/
