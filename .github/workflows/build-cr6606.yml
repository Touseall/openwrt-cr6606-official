name: Build OpenWrt CR660X (23.05 + SSR+ / FullCone / WiFi / PPPoE / Argon)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout this repo (configs only)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl python3

    - name: Clone OpenWrt 23.05
      run: |
        git clone https://github.com/openwrt/openwrt.git -b openwrt-23.05 --depth 1 openwrt
        cd openwrt
        ./scripts/feeds update -a

    - name: Add extra feeds (SSR+)
      run: |
        cd openwrt
        cat >> feeds.conf.default << "EOF"
        src-git helloworld https://github.com/fw876/helloworld
        EOF

        ./scripts/feeds update helloworld
        ./scripts/feeds install -a -p helloworld
        ./scripts/feeds install -a

    - name: Load CR660X seed config
      run: |
        cd openwrt
        cp ../config/cr660x.seed .config
        make defconfig

    - name: Show final target info
      run: |
        cd openwrt
        echo "==== TARGET CHECK ===="
        grep CONFIG_TARGET_ .config || true
        grep CR660X .config || true

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-cr660x-23.05
        path: |
          openwrt/bin/targets/
          openwrt/bin/packages/
