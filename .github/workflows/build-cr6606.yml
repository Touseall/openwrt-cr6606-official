name: Build OpenWrt CR6606 (Official + SSR+/Passwall)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout this repo (configs only)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl python3

    - name: Clone official OpenWrt source
      run: |
        git clone https://github.com/openwrt/openwrt.git -b openwrt-23.05.3 --depth 1 openwrt
        cd openwrt
        ./scripts/feeds update -a

    - name: Add extra feeds (SSR+ / Passwall / FullCone)
      run: |
        cd openwrt
        # 追加第三方常用包源（kenzok8）
        cat >> feeds.conf.default << "EOF"
src-git kenzo https://github.com/kenzok8/openwrt-packages
src-git small https://github.com/kenzok8/small
EOF

        ./scripts/feeds update kenzo small
        ./scripts/feeds install -a -p kenzo
        ./scripts/feeds install -a -p small

        # 再安装官方 feeds（luci / packages / routing / telephony）
        ./scripts/feeds install -a

    - name: Copy CR6606 seed config
      run: |
        cd openwrt
        mkdir -p tmp-config
        cp ../config/cr6606.seed tmp-config/.config
        # 基于 seed 生成完整 .config
        make defconfig

    - name: Show final target info
      run: |
        cd openwrt
        grep CONFIG_TARGET_ .config || true
        grep CR6606 .config || true

    - name: Compile firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-cr6606-official
        path: |
          openwrt/bin/targets/
          openwrt/bin/packages/
